name: Novel Browser Glass Quality

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  pull-request-title:
    name: Validate PR title convention
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require feat or fix prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$PR_TITLE" =~ ^(feat|fix):[[:space:]].+ ]]; then
            echo "Pull request titles must start with 'feat: ' or 'fix: '."
            exit 1
          fi

  validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - development
          - staging
          - production
        node-version:
          - 20
          - 22
    env:
      NOVEL_BROWSER_ENV: ${{ matrix.environment }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run static checks
        run: npm run check

      - name: Run benchmarks
        run: npm run benchmark

      - name: Run behavior tests
        run: npm test

  static-artifact:
    name: Package deployable app
    needs:
      - validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package deployable files
        uses: actions/upload-artifact@v4
        with:
          name: novel-browser-glass-static-app
          path: |
            novel-browser
            api
            vercel.json
            package.json
          if-no-files-found: error
